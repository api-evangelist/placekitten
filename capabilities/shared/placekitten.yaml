name: placekitten
description: |
  Shared PlaceKitten capability definitions. Wraps the legacy
  placekitten.com placeholder image service. Service is currently
  offline (HTTP 521) — these capabilities are preserved for historical
  reference and for tooling that targets archived copies / mirrors.
version: 0.1.0
status: deprecated
provider: PlaceKitten
baseUrl: https://placekitten.com
operations:
  - id: getKittenImage
    method: GET
    path: /{width}/{height}
    summary: Get Color Kitten Image
    inputs:
      - name: width
        type: integer
        required: true
      - name: height
        type: integer
        required: true
    output:
      contentType: image/jpeg
  - id: getGrayscaleKittenImage
    method: GET
    path: /g/{width}/{height}
    summary: Get Grayscale Kitten Image
    inputs:
      - name: width
        type: integer
        required: true
      - name: height
        type: integer
        required: true
    output:
      contentType: image/jpeg
